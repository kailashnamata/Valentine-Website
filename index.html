<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Be My Valentine ❤️</title>
<link rel="stylesheet" href="style.css"></head>
<body>
<div class="hearts"></div>
<div class="card" id="card">
<h1>❤️ Will You Be My Valentine? ❤️</h1>
<p>You make every day brighter.</p>
<div id="q1">
<button id="yes">YES 💖</button>
<button id="no">NO 🙈</button>
</div>
<div id="next" class="hidden">
<h2>You said YES! 🥹❤️</h2>
<p>Answer these...</p>
<div class="qa"><p>Will you always let me make you smile?</p><button onclick="nextQ('Aww ❤️')">Yes</button><button onclick="nextQ('Even More ❤️')">Absolutely</button></div>
<div class="qa"><p>Unlimited hugs?</p><button onclick="nextQ('Yay! 🤗')">Yes</button><button onclick="nextQ('Best!')">Forever</button></div>
<div class="qa"><p>Unlimited dates?</p><button onclick="nextQ('Perfect 🌹')">Of course</button><button onclick="nextQ('Adventure!')">Always</button></div>
<div id="final" class="hidden"><h2>I Love You ❤️</h2><p>Thank you for being the best part of my life.</p><p>Forever Yours,<br><b>My Love</b></p></div>
</div>
</div>
<script src="script.js"></script>
</body></html>
